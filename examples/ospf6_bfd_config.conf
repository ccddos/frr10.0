!
! Sample OSPFv3 with BFD Configuration
! This configuration demonstrates how to integrate BFD with OSPFv3
! for fast failure detection in IPv6 networks
!

! === BFD Configuration ===
bfd
 ! Define BFD profiles for different network types
 profile lan
  detect-multiplier 3
  receive-interval 300
  transmit-interval 300
 !
 profile wan
  detect-multiplier 5
  receive-interval 1000
  transmit-interval 1000
 !
 profile critical
  detect-multiplier 3
  receive-interval 200
  transmit-interval 200
 !
!

! === OSPFv3 Configuration ===
router ospf6
 ! Set router ID (IPv4 format)
 router-id 192.168.1.1
 
 ! Define areas if using multi-area setup
 area 0.0.0.0 range 2001:db8::/32
 area 0.0.0.1 range 2001:db8:1::/48
 
 ! Global OSPFv3 settings
 auto-cost reference-bandwidth 10000
 timers throttle spf 200 400 10000
!

! === Interface Configuration with BFD ===

! Backbone interface - critical link with fast BFD
interface eth0
 description "Backbone connection to Area 0"
 ipv6 address 2001:db8::1/64
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 priority 100
 ipv6 ospf6 cost 10
 ipv6 ospf6 bfd profile critical
 ipv6 ospf6 hello-interval 10
 ipv6 ospf6 dead-interval 40
!

! LAN interface - standard BFD for local network
interface eth1
 description "LAN connection to Area 1"
 ipv6 address 2001:db8:1::1/64
 ipv6 ospf6 area 0.0.0.1
 ipv6 ospf6 priority 10
 ipv6 ospf6 cost 100
 ipv6 ospf6 bfd profile lan
 ipv6 ospf6 hello-interval 10
 ipv6 ospf6 dead-interval 40
!

! WAN interface - conservative BFD for slow links
interface eth2
 description "WAN connection"
 ipv6 address 2001:db8:2::1/64
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 priority 0
 ipv6 ospf6 cost 1000
 ipv6 ospf6 bfd profile wan
 ipv6 ospf6 hello-interval 30
 ipv6 ospf6 dead-interval 120
!

! Point-to-point interface - custom BFD parameters
interface eth3
 description "P2P link with custom BFD"
 ipv6 address 2001:db8:3::1/64
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 network point-to-point
 ipv6 ospf6 cost 50
 ! Legacy BFD configuration with specific parameters
 ! ipv6 ospf6 bfd 3 250 250
 ! Modern approach using profile
 ipv6 ospf6 bfd profile critical
!

! Loopback interface - no BFD needed
interface lo
 ipv6 address 2001:db8:ffff::1/128
 ipv6 ospf6 area 0.0.0.0
 ipv6 ospf6 passive
!

! === Route Maps and Filtering ===
ipv6 prefix-list REDISTRIBUTE-STATIC seq 10 permit 2001:db8::/32 le 128

route-map REDIS-STATIC permit 10
 match ipv6 address prefix-list REDISTRIBUTE-STATIC
!

router ospf6
 redistribute static route-map REDIS-STATIC
!

! === Logging and Monitoring ===
log file /var/log/frr/ospf6d.log
log syslog informational
!

! Debug commands (uncomment for troubleshooting)
! debug ipv6 ospf6 neighbor
! debug ipv6 ospf6 interface  
! debug bfd

! === Verification Commands ===
! 
! To verify this configuration:
!
! show ipv6 ospf6 neighbor
! show ipv6 ospf6 interface
! show ipv6 ospf6 database
! show bfd peers
! show bfd peer detail
! show running-config
!
! To test BFD failure detection:
! 1. Enable debugging: debug bfd
! 2. Disconnect cable or shutdown interface
! 3. Watch for rapid neighbor down detection
! 4. Compare with/without BFD timing
!

! === Network Topology Example ===
!
!     Area 0 (Backbone)
!         |
!    [R1]--eth0--[R2]
!     |            |
!   eth1          eth1  
!     |            |
!   Area 1       Area 2
!
! R1 Configuration (this file)
! - eth0: Backbone to R2 with critical BFD profile
! - eth1: LAN to Area 1 with standard BFD
!
! Expected Behavior:
! - Normal OSPFv3 convergence in ~40 seconds (dead interval)
! - With BFD: Failure detection in ~600ms (critical profile)
! - BFD sessions automatically created for neighbors in TWOWAY+ state
! - Neighbor failures detected via BFD trigger immediate reconvergence
!